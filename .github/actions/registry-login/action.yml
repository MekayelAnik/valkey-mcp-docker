name: Registry Login
description: Login to Docker Hub and GitHub Container Registry

inputs:
  dockerhub_username:
    description: Docker Hub username
    required: false
    default: ''
  dockerhub_token:
    description: Docker Hub access token
    required: false
    default: ''
  ghcr_actor:
    description: GitHub actor for GHCR login
    required: false
    default: ''
  ghcr_token:
    description: GitHub token for GHCR login
    required: false
    default: ''
  push_to_dockerhub:
    description: Enable Docker Hub login
    required: false
    default: 'true'
  push_to_ghcr:
    description: Enable GHCR login
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Login to Docker Hub (with retry)
      if: inputs.push_to_dockerhub != 'false' && inputs.dockerhub_username != ''
      uses: nick-fields/retry@v4
      env:
        REG_USER: ${{ inputs.dockerhub_username }}
        REG_TOKEN: ${{ inputs.dockerhub_token }}
      with:
        timeout_seconds: 30
        max_attempts: 5
        retry_wait_seconds: 2
        warning_on_retry: true
        shell: bash
        command: |
          set -euo pipefail
          printf '%s' "$REG_TOKEN" | docker login docker.io \
            --username "$REG_USER" --password-stdin

    - name: Login to GitHub Container Registry (with retry)
      if: inputs.push_to_ghcr != 'false' && inputs.ghcr_actor != ''
      uses: nick-fields/retry@v4
      env:
        REG_USER: ${{ inputs.ghcr_actor }}
        REG_TOKEN: ${{ inputs.ghcr_token }}
      with:
        timeout_seconds: 30
        max_attempts: 5
        retry_wait_seconds: 2
        warning_on_retry: true
        shell: bash
        command: |
          set -euo pipefail
          printf '%s' "$REG_TOKEN" | docker login ghcr.io \
            --username "$REG_USER" --password-stdin
